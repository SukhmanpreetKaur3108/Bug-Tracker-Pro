{% extends "base.html" %}
{% block title %}Edit Bug #{{ bug.id }} — Bug Tracker{% endblock %}

{% block content %}
<div class="form-card form-card-wide">
  <h2>Edit Bug <span class="muted">#{{ bug.id }}</span></h2>
  <form method="POST" action="{{ url_for('bug_edit', bug_id=bug.id) }}">

    <div class="form-group">
      <label for="title">Title <span class="hint">(1–200 chars)</span></label>
      <input type="text" id="title" name="title" required autofocus
             minlength="1" maxlength="200" value="{{ bug.title }}">
    </div>

    <div class="form-group">
      <label for="description">Description <span class="hint">(1–10 000 chars)</span></label>
      <textarea id="description" name="description" rows="5" required
                maxlength="10000">{{ bug.description }}</textarea>
    </div>

    <div class="form-group">
      <label for="steps">Steps to Reproduce <span class="hint">(optional)</span></label>
      <textarea id="steps" name="steps" rows="3"
                maxlength="10000">{{ bug.steps_to_reproduce }}</textarea>
    </div>

    <div class="form-group">
      <label for="severity">Severity</label>
      <select id="severity" name="severity">
        {% for s in ['Low', 'Medium', 'High', 'Critical'] %}
          <option value="{{ s }}" {% if bug.severity == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>

    <p class="hint">
      Priority score will be re-computed automatically based on the updated
      severity and the bug's age ({{ bug.created_at[:10] }}).
    </p>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('bug_detail', bug_id=bug.id) }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

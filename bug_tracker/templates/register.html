{% extends "base.html" %}
{% block title %}Register — Bug Tracker{% endblock %}

{% block content %}
<div class="form-card">
  <h2>Create Account</h2>
  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label for="username">Username <span class="hint">(3–50 chars)</span></label>
      <input type="text" id="username" name="username" required autofocus
             minlength="3" maxlength="50" placeholder="e.g. john_doe">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
             maxlength="255" placeholder="e.g. john@example.com">
    </div>
    <div class="form-group">
      <label for="password">Password <span class="hint">(8–64 chars)</span></label>
      <input type="password" id="password" name="password" required
             minlength="8" maxlength="64" placeholder="Choose a strong password">
    </div>
    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="Tester">Tester</option>
        <option value="Developer">Developer</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Register</button>
  </form>
  <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}

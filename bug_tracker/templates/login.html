{% extends "base.html" %}
{% block title %}Login — Bug Tracker{% endblock %}

{% block content %}
<div class="form-card">
  <h2>Login</h2>
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus
             minlength="3" maxlength="50" placeholder="Your username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             minlength="8" maxlength="64" placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Login</button>
  </form>
  <p class="form-footer">No account? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
{% endblock %}
